{% extends "base.html" %}

{% block content %}
<div class="container">

  <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-md); margin-bottom: var(--space-lg);">
    <div>
      <h1>Pets para adoção</h1>
      <p class="text-muted" style="margin-top: var(--space-xs);">Encontre seu novo melhor amigo e dê um lar a quem precisa.</p>
    </div>
    {% if current_user.is_authenticated %}
      <a href="{{ url_for('adoption.create') }}" class="btn btn--primary">
        + Colocar para adoção
      </a>
    {% endif %}
  </div>

  <div class="filters" id="filters" role="group" aria-label="Filtrar por tipo de animal">
    <a href="{{ url_for('adoption.list_posts') }}"
       class="filter-btn {{ 'active' if not type_filter }}"
       aria-current="{{ 'true' if not type_filter else 'false' }}">
      Todos
    </a>
    <a href="{{ url_for('adoption.list_posts', pet_type='dog') }}"
       class="filter-btn {{ 'active' if type_filter == 'dog' }}"
       aria-current="{{ 'true' if type_filter == 'dog' else 'false' }}">
      🐶 Cachorros
    </a>
    <a href="{{ url_for('adoption.list_posts', pet_type='cat') }}"
       class="filter-btn {{ 'active' if type_filter == 'cat' }}"
       aria-current="{{ 'true' if type_filter == 'cat' else 'false' }}">
      🐱 Gatos
    </a>
    <a href="{{ url_for('adoption.list_posts', pet_type='bird') }}"
       class="filter-btn {{ 'active' if type_filter == 'bird' }}"
       aria-current="{{ 'true' if type_filter == 'bird' else 'false' }}">
      🐦 Pássaros
    </a>
    <a href="{{ url_for('adoption.list_posts', pet_type='other') }}"
       class="filter-btn {{ 'active' if type_filter == 'other' }}"
       aria-current="{{ 'true' if type_filter == 'other' else 'false' }}">
      🐾 Outros
    </a>
  </div>

  <div id="posts-grid" aria-live="polite" aria-atomic="true">
    {% include 'adoption/_grid.html' %}
  </div>

</div>
{% endblock %}
